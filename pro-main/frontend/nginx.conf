server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: proxy /api to the backend internally
    # However, since the frontend currently hardcodes http://localhost:5000 in utils.js,
    # it makes client-side requests from the user's browser, not from the Nginx container.
}
